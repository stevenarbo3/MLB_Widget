name: MLB Widget API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 18 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    name: ESPN API Integration Tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests pytest-cov

      - name: Run ESPN API tests
        run: |
          pytest tests/test_espn_api.py -v --tb=short

      - name: Generate coverage report
        run: |
          pytest tests/test_espn_api.py --cov=tests --cov-report=term-missing
